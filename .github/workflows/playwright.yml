name: Playwright CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  public-chromium-shards:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: "1/3"
            shard_id: "1-3"
          - shard: "2/3"
            shard_id: "2-3"
          - shard: "3/3"
            shard_id: "3-3"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run chromium shard
        run: npm run test:public:shard -- --shard=${{ matrix.shard }}

      - name: Upload shard artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-shard-${{ matrix.shard_id }}
          path: |
            blob-report/
            test-results/
          if-no-files-found: warn

  api-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run API smoke
        run: npm run test -- --project=api-smoke

      - name: Upload API artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-api-smoke
          path: |
            blob-report/
            test-results/
          if-no-files-found: warn

  wallet-mock:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run mocked-wallet suite (non-blocking showcase)
        continue-on-error: true
        run: npm run test:wallet-mock

      - name: Upload wallet-mock artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-wallet-mock
          path: |
            blob-report/
            test-results/
          if-no-files-found: warn
